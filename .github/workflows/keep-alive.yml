name: Keep Render Alive

on:
  schedule:
    - cron: '*/14 * * * *'   # ping every 14 min — Render sleeps after 15 min of inactivity

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: |
          curl -s --max-time 30 https://roundup-briefs.onrender.com/api/stats \
            && echo "Server is awake" \
            || echo "Server did not respond (may be waking up)"
